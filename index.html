<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>感情ある？診断</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💭</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF6B8A;
  --pink-light: #FFB3C6;
  --blue: #8EC5FC;
  --blue-light: #D4EAFF;
  --cream: #FFF9F0;
  --purple: #B8A9E8;
  --yellow: #FFD93D;
  --text: #2D3436;
  --text-light: #636E72;
  --card: #FFFFFF;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --radius: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: linear-gradient(135deg, #FFF0F5 0%, #F0F4FF 50%, #FFF9F0 100%);
  min-height: 100dvh;
  color: var(--text);
  overflow-x: hidden;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen {
  display: none;
  width: 100%;
  animation: fadeSlideIn 0.5s ease;
}
.screen.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-24px); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
@keyframes countUp {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes dotBlink {
  0%, 20% { opacity: 0; }
  40% { opacity: 1; }
}
@keyframes gaugeGrow {
  from { width: 0%; }
}
@keyframes bounceIn {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== START SCREEN ===== */
.start-content { text-align: center; }

.hero-emoji {
  font-size: 80px;
  animation: float 3s ease-in-out infinite;
  margin-bottom: 8px;
}
.hero-sub-emoji {
  font-size: 48px;
  margin-bottom: 24px;
  display: flex;
  justify-content: center;
  gap: 32px;
}
.hero-sub-emoji span:first-child { animation: pulse 2s ease-in-out infinite; }
.hero-sub-emoji span:last-child { animation: pulse 2s ease-in-out infinite 1s; }

.start-content h1 {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 12px;
  line-height: 1.3;
}
.start-content h1 span {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.start-content .subtitle {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.8;
  margin-bottom: 40px;
}
.start-content .subtitle em {
  font-style: normal;
  font-weight: 700;
  color: var(--text);
}

.btn-start {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: white;
  border: none;
  padding: 18px 64px;
  border-radius: 50px;
  font-size: 18px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,107,138,0.4);
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn-start:active { transform: scale(0.95); }

/* ===== QUIZ SCREEN ===== */
.progress-wrapper {
  margin-bottom: 24px;
}
.progress-bar {
  height: 6px;
  background: #EEE;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--blue));
  border-radius: 3px;
  transition: width 0.5s ease;
  width: 0%;
}
.question-number {
  font-size: 13px;
  color: var(--text-light);
  font-weight: 700;
  text-align: right;
}

.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px 22px;
  box-shadow: var(--shadow);
  margin-top: 12px;
}
.scene-emoji {
  font-size: 40px;
  margin-bottom: 12px;
}
.scenario {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.7;
  margin-bottom: 24px;
  color: var(--text);
}

.options { display: flex; flex-direction: column; gap: 10px; }

.option-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: #F8F9FA;
  border: 2px solid transparent;
  border-radius: 14px;
  padding: 16px 18px;
  font-size: 14px;
  font-weight: 400;
  font-family: inherit;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s ease;
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
}
.option-btn:active {
  transform: scale(0.97);
  background: var(--pink-light);
  border-color: var(--pink);
}
.option-btn.selected {
  background: var(--pink-light);
  border-color: var(--pink);
  font-weight: 700;
}

/* Free text */
.free-input-area {
  margin-top: 4px;
}
.free-input {
  width: 100%;
  min-height: 80px;
  border: 2px solid #EEE;
  border-radius: 14px;
  padding: 16px;
  font-size: 16px;
  font-family: inherit;
  color: var(--text);
  resize: none;
  outline: none;
  transition: border-color 0.3s;
  background: #F8F9FA;
}
.free-input:focus { border-color: var(--pink); background: #FFF; }
.free-input::placeholder { color: #CCC; }

.btn-submit-free {
  margin-top: 14px;
  width: 100%;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: white;
  border: none;
  padding: 16px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.btn-submit-free:active { transform: scale(0.95); }
.btn-submit-free:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Free text reaction */
.free-reaction {
  display: none;
  text-align: center;
  padding: 32px 16px;
  animation: bounceIn 0.5s ease;
}
.free-reaction.show { display: block; }
.free-reaction .reaction-emoji { font-size: 56px; margin-bottom: 12px; }
.free-reaction .reaction-text {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.6;
}

/* ===== ANALYSIS SCREEN ===== */
.analysis-content {
  text-align: center;
  padding: 40px 20px;
}
.analysis-emoji {
  font-size: 72px;
  margin-bottom: 24px;
  animation: pulse 1.5s ease-in-out infinite;
}
.analysis-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.analysis-dots span {
  font-size: 24px;
  font-weight: 800;
  color: var(--pink);
}
.analysis-dots span:nth-child(1) { animation: dotBlink 1.2s infinite 0s; }
.analysis-dots span:nth-child(2) { animation: dotBlink 1.2s infinite 0.2s; }
.analysis-dots span:nth-child(3) { animation: dotBlink 1.2s infinite 0.4s; }

.analysis-sub {
  font-size: 14px;
  color: var(--text-light);
  margin-top: 20px;
  opacity: 0;
  transition: opacity 0.5s;
}
.analysis-sub.show { opacity: 1; }

/* ===== RESULT SCREEN ===== */
.result-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 36px 24px;
  box-shadow: var(--shadow);
  text-align: center;
}
.result-emoji {
  font-size: 64px;
  margin-bottom: 8px;
  animation: bounceIn 0.6s ease 0.3s both;
}
.result-title {
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 24px;
  animation: bounceIn 0.6s ease 0.5s both;
}

.gauge-wrapper {
  margin: 0 auto 8px;
  max-width: 320px;
  animation: bounceIn 0.6s ease 0.7s both;
}
.gauge-labels {
  display: flex;
  justify-content: space-between;
  font-size: 24px;
  margin-bottom: 6px;
}
.gauge-track {
  height: 14px;
  background: #F0F0F0;
  border-radius: 7px;
  overflow: hidden;
  position: relative;
}
.gauge-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
  border-radius: 7px;
  animation: gaugeGrow 1.5s ease 1s both;
}
.gauge-marker {
  position: absolute;
  top: -4px;
  width: 22px;
  height: 22px;
  background: white;
  border: 3px solid var(--pink);
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  opacity: 0;
  transition: opacity 0.3s;
}
.gauge-marker.show { opacity: 1; }

.result-percent {
  font-size: 56px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 16px 0 4px;
  animation: bounceIn 0.6s ease 0.9s both;
}
.result-percent-label {
  font-size: 14px;
  color: var(--text-light);
  margin-bottom: 24px;
  font-weight: 700;
}

.result-desc {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 24px;
  text-align: left;
  background: #FFF5F7;
  padding: 18px;
  border-radius: 14px;
  animation: bounceIn 0.6s ease 1.1s both;
}

.result-freetext {
  text-align: left;
  background: #F0F4FF;
  padding: 16px 18px;
  border-radius: 14px;
  margin-bottom: 24px;
  animation: bounceIn 0.6s ease 1.3s both;
}
.result-freetext-label {
  font-size: 12px;
  color: var(--text-light);
  font-weight: 700;
  margin-bottom: 6px;
}
.result-freetext-quote {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.result-freetext-analysis {
  font-size: 13px;
  color: var(--purple);
  font-weight: 700;
}

.result-traits {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 32px;
  animation: bounceIn 0.6s ease 1.5s both;
}
.trait-badge {
  background: linear-gradient(135deg, #FFF0F5, #F0F4FF);
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.btn-retry {
  background: var(--card);
  color: var(--pink);
  border: 2px solid var(--pink);
  padding: 16px 48px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
  animation: bounceIn 0.6s ease 1.7s both;
}
.btn-retry:active {
  transform: scale(0.95);
  background: var(--pink);
  color: white;
}
</style>
</head>
<body>
<div class="container">

  <!-- START SCREEN -->
  <div id="start-screen" class="screen active">
    <div class="start-content">
      <div class="hero-emoji">💭</div>
      <div class="hero-sub-emoji">
        <span>❤️</span>
        <span>🧠</span>
      </div>
      <h1>感情ある？<span>診断</span></h1>
      <p class="subtitle">
        あなたは<em>感情タイプ</em>？<em>論理タイプ</em>？<br>
        10問でサクッと診断！
      </p>
      <button class="btn-start" onclick="startQuiz()">はじめる</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="screen">
    <div class="progress-wrapper">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="question-number" id="question-number"></div>
    </div>
    <div class="question-card" id="question-card"></div>
  </div>

  <!-- ANALYSIS SCREEN -->
  <div id="analysis-screen" class="screen">
    <div class="analysis-content">
      <div class="analysis-emoji">🔍</div>
      <div class="analysis-text" id="analysis-text">あなたの回答をスキャン中</div>
      <div class="analysis-dots"><span>.</span><span>.</span><span>.</span></div>
      <div class="analysis-sub" id="analysis-sub">感情センサー起動中...</div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <div class="result-card" id="result-card"></div>
  </div>

</div>

<script>
const questions = [
  {
    type: 'choice',
    emoji: '💬',
    scenario: 'パートナーや友人から\n「今日、仕事で怒られちゃった…」\nとLINEが来た。あなたの第一声は？',
    options: [
      { text: '「えー！大丈夫？つらかったね…」', score: 4 },
      { text: '「お疲れさま。何があったの？」', score: 3 },
      { text: '「何で怒られたの？」', score: 2 },
      { text: '「原因わかってるなら、次気をつければOKでしょ」', score: 1 },
    ]
  },
  {
    type: 'choice',
    emoji: '🏢',
    scenario: '部下がプレゼンで大失敗。\nめちゃくちゃ落ち込んでいる。あなたは？',
    options: [
      { text: '「緊張するよね。大丈夫、次があるよ！」とまず励ます', score: 4 },
      { text: '「惜しかったよ。どこが難しかった？」と聞いてみる', score: 3 },
      { text: '「ここを直せばもっと良くなるよ」と改善点を伝える', score: 2 },
      { text: '「振り返りを一緒にやろう」と仕組みで解決する', score: 1 },
    ]
  },
  {
    type: 'choice',
    emoji: '⚖️',
    scenario: '人生の大事な決断。\n最終的にあなたが頼りにするのは？',
    options: [
      { text: '自分の直感。ピンときたかどうか', score: 4 },
      { text: '信頼できる人の「いいと思う！」という言葉', score: 3 },
      { text: 'メリット・デメリットの比較表', score: 2 },
      { text: 'データや数字、客観的な根拠', score: 1 },
    ]
  },
  {
    type: 'choice',
    emoji: '👥',
    scenario: 'チームの雰囲気が\nなんか最近ギスギスしてる…\nあなたの動きは？',
    options: [
      { text: 'ひとりひとりに「最近どう？」とさりげなく声をかける', score: 4 },
      { text: 'ランチや飲みに誘って場を和ませる', score: 3 },
      { text: '1on1ミーティングを設定して話を聞く', score: 2 },
      { text: '業務フローを見直して、そもそもの原因を特定する', score: 1 },
    ]
  },
  {
    type: 'choice',
    emoji: '☕',
    scenario: '友達が「転職しようか\n迷ってるんだよね…」と相談してきた。',
    options: [
      { text: '「わかるー！その気持ちめっちゃわかる」とまず共感', score: 4 },
      { text: '「いろいろあるよね。何が一番モヤモヤする？」と聞く', score: 3 },
      { text: '「転職先の条件ってどんな感じ？」と情報収集', score: 2 },
      { text: '「年収とか成長性で比較表作ってみたら？」と提案', score: 1 },
    ]
  },
  {
    type: 'free',
    emoji: '😱',
    scenario: '部下が大事な商談に\n15分遅刻してきた！\n\nあなたが最初に言うひとことを\nそのまま書いてください。',
    placeholder: 'ここに入力...',
  },
  {
    type: 'choice',
    emoji: '🎬',
    scenario: '映画のラストシーン。\n周りが泣いている。あなたは…？',
    options: [
      { text: '一緒に号泣。ティッシュください', score: 4 },
      { text: 'ウルッとくるけど、なんとか我慢してる', score: 3 },
      { text: '「いい映画だったね」と冷静に感想を言う', score: 2 },
      { text: '「あの伏線の回収すごかったな」と分析モードに入る', score: 1 },
    ]
  },
  {
    type: 'choice',
    emoji: '🤝',
    scenario: '研修で初対面の人とペアワーク開始。\nあなたがまず意識することは？',
    options: [
      { text: '相手がリラックスできるように笑顔で雑談から入る', score: 4 },
      { text: '共通点を見つけて距離を縮める', score: 3 },
      { text: 'お互いの役割を決めてスムーズに進める', score: 2 },
      { text: 'まずゴールと進め方を確認する', score: 1 },
    ]
  },
  {
    type: 'choice',
    emoji: '💡',
    scenario: '自分のアイデアが\n会議でバッサリ却下された。\nそのときの心の中は？',
    options: [
      { text: '正直かなりヘコむ…しばらく引きずる', score: 4 },
      { text: 'モヤッとするけど、相手の意見も聞いてみよう', score: 3 },
      { text: 'なるほど、どこがダメだったか冷静に分析しよう', score: 2 },
      { text: 'データを集めて、次の会議でリベンジだ', score: 1 },
    ]
  },
  {
    type: 'choice',
    emoji: '🌙',
    scenario: '日曜の夜。\nふと頭に浮かぶことは？',
    options: [
      { text: '「あの人、最近元気なかったな…大丈夫かな」', score: 4 },
      { text: '「明日みんなに会えるの楽しみだな」', score: 3 },
      { text: '「来週のスケジュール確認しとこ」', score: 2 },
      { text: '「月曜のタスクを効率よく片付ける方法は…」', score: 1 },
    ]
  },
];

// Result tiers
const resultTiers = [
  {
    min: 85, emoji: '🫶', title: '感情の塊',
    desc: 'あなたの共感力、もはや超能力。相手が話し始める前に気持ちを察してるレベル。周りの人はあなたに癒されてるはず。ただ、たまに他人の感情を背負いすぎて疲れることもあるので、自分のケアも忘れずに！',
    traits: ['共感力 MAX', '空気読み名人', '相談されがち', 'もらい泣き常習犯']
  },
  {
    min: 70, emoji: '💗', title: 'ハートフルリーダー',
    desc: '感情アンテナ高め。チームの空気を読むのが得意で、人間関係の潤滑油的存在。「この人がいると安心する」と思われるタイプ。論理的な部分もちゃんとあるから、バランス感覚も◎。',
    traits: ['感情アンテナ高め', '安心感の塊', '聞き上手', '人間関係の達人']
  },
  {
    min: 50, emoji: '⚖️', title: 'バランスの達人',
    desc: '感情と論理のハイブリッド型。場面に応じて使い分けられる器用なタイプ。共感するときはしっかり共感して、分析するときは冷静になれる。研修ではチームで一番重宝される存在かも。',
    traits: ['TPO使い分け型', '器用なハイブリッド', '調整役タイプ', '万能プレイヤー']
  },
  {
    min: 30, emoji: '🧠', title: 'ロジカルモンスター',
    desc: '頭脳派。効率と合理性を愛する人。問題が起きたら感情より先に解決策が浮かぶタイプ。でも感情がないわけじゃない…たぶん。きっと。おそらく。心の奥にはちゃんと温かいものがあるはず！',
    traits: ['分析力おばけ', '効率の鬼', '冷静沈着', '解決策マシーン']
  },
  {
    min: 0, emoji: '🤖', title: 'ヒューマンAI',
    desc: 'あなた、本当に人間ですか？感情回路がスリープモードの可能性あり。「で、結論は？」が口癖ではないでしょうか。でもそれはあなたの最大の強み。ブレない判断力でチームを支える頼れる存在です。',
    traits: ['感情回路スリープ中', 'ブレない軸', '結論ファースト', '判断力の権化']
  },

// Free text analysis
function analyzeFreeText(text) {
  if (!text || text.trim().length === 0) return { score: 3, emoji: '🤔', msg: '無言の圧…！それもひとつの回答ですね' };
  const t = text.toLowerCase();
  const emotional = ['大丈夫', 'だいじょうぶ', '心配', 'しんぱい', '何かあった', 'なにかあった', '怪我', 'けが', '事故', 'じこ', '無事', 'ぶじ', '体調', 'たいちょう'];
  const logical = ['なぜ', 'なんで', '何で', '理由', 'りゆう', '遅刻', 'ちこく', '遅れ', 'おくれ', 'ダメ', 'だめ', '困る', 'こまる', '報告', 'ほうこく', '反省', 'はんせい', '連絡', 'れんらく', '時間', 'じかん', 'ありえない'];
  const softEmotional = ['お疲れ', 'おつかれ', '焦', 'あせ', '慌', 'あわて', '大変', 'たいへん', '急', 'いそ'];
  const softLogical = ['どうした', '何が', 'なにが', '状況', 'じょうきょう', '説明', 'せつめい', '事情', 'じじょう'];

  for (const kw of emotional) { if (t.includes(kw)) return { score: 4, emoji: '❤️', msg: 'まず相手を心配するタイプ！\n優しさが溢れてます' }; }
  for (const kw of logical) { if (t.includes(kw)) return { score: 1, emoji: '🧊', msg: 'まず原因を追求するタイプ！\nクールですね〜' }; }
  for (const kw of softEmotional) { if (t.includes(kw)) return { score: 3, emoji: '🥺', msg: '相手を気遣うタイプですね！\nさりげない優しさ' }; }
  for (const kw of softLogical) { if (t.includes(kw)) return { score: 2, emoji: '🤔', msg: '状況把握から入るタイプ！\n冷静ですね' }; }
  return { score: 3, emoji: '😎', msg: '独自の切り返し！\nなかなかのセンスです' };
}

// Game state
let currentQuestion = 0;
let totalScore = 0;
let freeTextResponse = '';
let freeTextAnalysis = null;
let isTransitioning = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const screen = document.getElementById(id);
  screen.classList.remove('active');
  void screen.offsetWidth;
  screen.classList.add('active');
}

function startQuiz() {
  currentQuestion = 0;
  totalScore = 0;
  freeTextResponse = '';
  freeTextAnalysis = null;
  isTransitioning = false;
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQuestion];
  const total = questions.length;
  const progressPct = ((currentQuestion) / total) * 100;

  document.getElementById('progress-fill').style.width = progressPct + '%';
  document.getElementById('question-number').textContent = `Q${currentQuestion + 1} / ${total}`;

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeSlideIn 0.4s ease';

  const scenarioHtml = q.scenario.replace(/\n/g, '<br>');

  if (q.type === 'choice') {
    const optionsHtml = q.options.map((opt, i) =>
      `<button class="option-btn" onclick="selectOption(${i})">${opt.text}</button>`
    ).join('');
    card.innerHTML = `
      <div class="scene-emoji">${q.emoji}</div>
      <p class="scenario">${scenarioHtml}</p>
      <div class="options">${optionsHtml}</div>
    `;
  } else {
    card.innerHTML = `
      <div class="scene-emoji">${q.emoji}</div>
      <p class="scenario">${scenarioHtml}</p>
      <div class="free-input-area">
        <textarea class="free-input" id="free-input" placeholder="${q.placeholder}" maxlength="100"></textarea>
        <button class="btn-submit-free" id="btn-submit-free" onclick="submitFreeText()" disabled>次へ</button>
      </div>
      <div class="free-reaction" id="free-reaction">
        <div class="reaction-emoji" id="reaction-emoji"></div>
        <div class="reaction-text" id="reaction-text"></div>
      </div>
    `;
    const input = document.getElementById('free-input');
    const btn = document.getElementById('btn-submit-free');
    input.addEventListener('input', () => {
      btn.disabled = input.value.trim().length === 0;
    });
    setTimeout(() => input.focus(), 400);
  }
}

function selectOption(index) {
  if (isTransitioning) return;
  isTransitioning = true;

  const q = questions[currentQuestion];
  const score = q.options[index].score;
  totalScore += score;

  const btns = document.querySelectorAll('.option-btn');
  btns[index].classList.add('selected');
  btns.forEach(b => b.style.pointerEvents = 'none');

  setTimeout(() => {
    currentQuestion++;
    isTransitioning = false;
    if (currentQuestion < questions.length) {
      renderQuestion();
    } else {
      showAnalysis();
    }
  }, 350);
}

function submitFreeText() {
  if (isTransitioning) return;
  isTransitioning = true;

  const input = document.getElementById('free-input');
  const text = input.value.trim();
  freeTextResponse = text;
  freeTextAnalysis = analyzeFreeText(text);
  totalScore += freeTextAnalysis.score;

  // Show reaction
  const inputArea = document.querySelector('.free-input-area');
  inputArea.style.display = 'none';
  const reaction = document.getElementById('free-reaction');
  document.getElementById('reaction-emoji').textContent = freeTextAnalysis.emoji;
  document.getElementById('reaction-text').innerHTML = freeTextAnalysis.msg.replace(/\n/g, '<br>');
  reaction.classList.add('show');

  setTimeout(() => {
    currentQuestion++;
    isTransitioning = false;
    if (currentQuestion < questions.length) {
      renderQuestion();
    } else {
      showAnalysis();
    }
  }, 1800);
}

function showAnalysis() {
  showScreen('analysis-screen');
  const sub = document.getElementById('analysis-sub');

  setTimeout(() => { sub.classList.add('show'); }, 1000);
  setTimeout(() => {
    document.getElementById('analysis-text').textContent = '診断完了！';
    document.querySelector('.analysis-emoji').textContent = '✨';
    sub.textContent = '結果を表示します...';
  }, 2200);
  setTimeout(() => { showResult(); }, 3000);
}

function showResult() {
  // Calculate percentage: score range is 10-40, map to 0-100
  const minScore = questions.length * 1;
  const maxScore = questions.length * 4;
  const pct = Math.round(((totalScore - minScore) / (maxScore - minScore)) * 100);

  // Find tier
  let tier = resultTiers[resultTiers.length - 1];
  for (const t of resultTiers) {
    if (pct >= t.min) { tier = t; break; }
  }

  const card = document.getElementById('result-card');

  const freeTextSection = freeTextResponse ? `
    <div class="result-freetext">
      <div class="result-freetext-label">💬 商談遅刻への一言</div>
      <div class="result-freetext-quote">「${escapeHtml(freeTextResponse)}」</div>
      <div class="result-freetext-analysis">${freeTextAnalysis.emoji} ${freeTextAnalysis.msg.replace(/\n/g, ' ')}</div>
    </div>
  ` : '';

  const traitsHtml = tier.traits.map(t => `<span class="trait-badge">${t}</span>`).join('');

  card.innerHTML = `
    <div class="result-emoji">${tier.emoji}</div>
    <div class="result-title">${tier.title}</div>
    <div class="gauge-wrapper">
      <div class="gauge-labels"><span>🧠</span><span>❤️</span></div>
      <div class="gauge-track">
        <div class="gauge-fill" style="width: ${pct}%"></div>
        <div class="gauge-marker" id="gauge-marker" style="left: ${pct}%"></div>
      </div>
    </div>
    <div class="result-percent" id="result-percent">0%</div>
    <div class="result-percent-label">感情度</div>
    <div class="result-desc">${tier.desc}</div>
    ${freeTextSection}
    <div class="result-traits">${traitsHtml}</div>
    <button class="btn-retry" onclick="startQuiz()">もう一度やる</button>
  `;

  showScreen('result-screen');

  // Animate percentage counter
  setTimeout(() => {
    animateCounter(0, pct, 1500);
    setTimeout(() => {
      document.getElementById('gauge-marker').classList.add('show');
    }, 1600);
  }, 800);
}

function animateCounter(from, to, duration) {
  const el = document.getElementById('result-percent');
  const start = performance.now();
  function update(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(from + (to - from) * eased);
    el.textContent = current + '%';
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
